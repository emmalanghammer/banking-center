<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Banking Center — Rent Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Roboto',sans-serif;font-size:14px;color:#13314c;background:#f5f8fa}
input,button,select{font-family:'Roboto',sans-serif}
button{cursor:pointer}
/* Checkbox — design system: white box w/ grey border, orange fill + white check when checked */
input[type="checkbox"]{appearance:none;-webkit-appearance:none;width:20px;height:20px;flex-shrink:0;margin:0;border:2px solid #b3b3b3;border-radius:2px;background:#fff;cursor:pointer;position:relative;vertical-align:middle}
input[type="checkbox"]:checked{background:#F58220;border-color:#F58220}
input[type="checkbox"]:checked::after{content:'';position:absolute;left:6px;top:1.5px;width:5px;height:10px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:transparent;border-radius:4px}
*:hover::-webkit-scrollbar-thumb{background:#cedbe7}
*{scrollbar-width:thin;scrollbar-color:transparent transparent}
*:hover{scrollbar-color:#cedbe7 transparent}

/* ── App shell ── */
.app{height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── Top header ── */
.top-hdr{height:48px;background:rgb(19,49,76);display:flex;align-items:center;padding:0 16px;flex-shrink:0;gap:0}
.top-logo{display:flex;align-items:center;gap:8px;margin-right:16px;flex-shrink:0}
.top-logo-text{color:#fff;font-size:18px;font-weight:400;letter-spacing:.01em;white-space:nowrap}
.top-center{flex:1;display:flex;align-items:center;justify-content:center}
.top-nav-group{display:flex;align-items:center;margin-right:8px}
.top-nav-btn{width:40px;height:32px;background:rgb(66,90,112);border:none;display:flex;align-items:center;justify-content:center;border-right:1px solid rgba(255,255,255,.1)}
.top-nav-btn:last-child{border-right:none}
.top-nav-btn:first-child{border-radius:4px 0 0 4px}
.top-nav-btn:last-child{border-radius:0 4px 4px 0}
.cmd-search{width:454px;height:32px;background:rgb(66,90,112);border-radius:4px;display:flex;align-items:center;gap:8px;padding:0 10px;flex-shrink:0}
.cmd-search span{font-style:italic;font-size:12px;color:rgba(255,255,255,.65)}
.top-right{display:flex;align-items:center;gap:32px;margin-left:16px;flex-shrink:0}
.top-right-icons{display:flex;align-items:center;gap:20px}
.top-company{display:flex;flex-direction:column;align-items:flex-end;line-height:1}
.top-company span:first-child{font-size:12px;color:#fff;margin-bottom:2px}
.top-company span:last-child{font-size:14px;color:#fff}
.top-avatar{width:32px;height:32px;border-radius:50%;background:#008dd5;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}

/* ── Context bar ── */
.ctx-bar{height:40px;background:#008dd5;display:flex;align-items:center;padding:0 16px;flex-shrink:0;z-index:99}
.ctx-title{color:#fff;font-weight:500;font-size:15px;white-space:nowrap}
.ctx-right{margin-left:auto;display:flex;align-items:center;gap:4px}
.ctx-btn{background:none;border:none;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:4px}
.ctx-btn:hover{background:rgba(255,255,255,.15)}

/* ── Screens ── */
.screen{display:none}
.screen.active{display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden}

/* ── Quick actions ── */
.qa-bar{height:52px;background:rgba(255,255,255,.5);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.6);display:flex;align-items:center;padding:0 16px;gap:0;flex-shrink:0;overflow-x:auto}
.qa-sep{width:1px;height:16px;background:#cedbe7;flex-shrink:0;margin:0 16px}
.qa-btn{background:none;border:none;color:#008dd5;font-size:14px;padding:4px 0;white-space:nowrap}
.qa-btn:hover{text-decoration:underline}
.qa-orion{background:#fff;border:1px solid #008dd5;color:#13314c;font-size:14px;padding:0 12px;height:34px;border-radius:4px;display:flex;align-items:center;gap:6px;white-space:nowrap}
.qa-orion:hover{background:#f0f8fd}

/* ── BC body ── */
.bc-body{display:flex;flex:1;min-height:0;overflow:hidden}

/* ── Accounts table ── */
.bc-main{flex:1;min-width:0;min-height:0;display:flex;flex-direction:column;overflow:hidden;background:#fff;margin:24px 24px 24px 0;border-radius:4px;border:1px solid #cedbe7}
.bc-lbl{padding:16px 20px;font-size:14px;font-weight:600;color:#13314c;border-bottom:1px solid #eef2f7}
.bc-scroll{flex:1;overflow:auto;min-height:0}
.ao-tbl{width:100%;border-collapse:collapse}
.ao-tbl thead th{background:#fff;color:#999;font-size:12px;font-weight:400;padding:0 12px;height:40px;text-align:left;border-bottom:1px solid #eef2f7;white-space:nowrap;position:sticky;top:0;z-index:5}
.ao-tbl thead th.r{text-align:right}
.ao-tbl tbody td{height:48px;padding:0 12px;border-top:1px solid #eef2f7;font-size:14px;color:#13314c;vertical-align:middle}
.ao-tbl tbody td.r{text-align:right;font-variant-numeric:tabular-nums}
.ao-tbl tbody tr:hover td{background:#f7fbff}
.ao-conn{display:flex;align-items:center;gap:6px;font-size:13px;color:#666}
.ao-loz-err{display:inline-flex;align-items:center;background:#fbd6d8;color:#13314c;font-size:14px;padding:4px 8px;border-radius:4px;white-space:nowrap}
.ao-tx{display:inline-flex;align-items:center;gap:8px;height:24px;padding:4px 8px;border-radius:4px;font-size:14px;font-style:italic;color:#13314c;white-space:nowrap}
.ao-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}
.loz{display:inline-flex;align-items:center;gap:4px;font-size:13px;font-style:italic;color:#13314c;white-space:nowrap}
.loz-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.loz-dot.ok{background:#6eb744}
.loz-dot.warn{background:#f5a623}
.acct-link{background:none;border:none;color:#008dd5;font-size:14px;padding:0;cursor:pointer}
.acct-link:hover{text-decoration:underline}
.acct-sub{color:#b3b3b3;font-size:12px;margin-left:4px}

/* ── BC sidebar ── */
.bc-sidebar{width:460px;flex-shrink:0;overflow-y:auto;min-height:0;display:flex;flex-direction:column;gap:16px;padding:24px 16px 24px 24px}
.bc-card{background:rgba(255,255,255,.5);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.6);border-radius:4px;padding:16px;box-shadow:0 4px 16px rgba(0,0,0,.06)}
.bc-card.hi{border:none;min-height:160px;position:relative}
.bc-card.hi::before{content:'';position:absolute;inset:0;border-radius:4px;padding:1px;background:linear-gradient(135deg,#6eb744 0%,#008dd5 50%,#6eb744 100%);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
.bc-card-h{font-size:14px;font-weight:600;color:#13314c;margin-bottom:0;display:flex;align-items:center;gap:6px}
.bc-card-hrow{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.bc-ico-badge{width:24px;height:24px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.bc-ico-badge.purple{background:#ede8fa}
.bc-ico-badge.teal{background:#d1f0ec}
.bc-ico-badge.pink{background:#fde8ef}
.bc-card-count{font-size:12px;color:#999;font-weight:400;margin-left:auto}
.bc-num{font-size:24px;font-weight:500;color:#13314c;line-height:32px}
.bc-num2{font-size:20px;font-weight:500;color:#13314c}
.bc-div{height:1px;background:#eef2f7;margin:12px 0}
.bc-sub{font-size:12px;color:#666}
.bc-rm-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.bc-rm-lbl{font-size:12px;font-weight:600;color:#666;display:flex;align-items:center;gap:4px}
.loz-diff{display:inline-flex;align-items:center;padding:2px 8px;background:#fbe7c6;border-radius:200px;font-size:13px;color:#13314c;margin-left:8px}
.bc-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.bc-alert-dot{width:8px;height:8px;border-radius:50%;background:#f5a623}
.bc-alert-dot.err{background:#eb343c}
.insight-pill{font-size:13px;color:#13314c;padding:8px;background:#f5f8fa;border-radius:4px;line-height:1.5;margin-bottom:8px}
.bc-card.hi{border-color:#008dd5}
.ins-row{display:flex;flex-direction:column;gap:8px;padding:8px 0}
.ins-row:first-child{padding-top:0}
.ins-row+.ins-row{border-top:1px solid #eef2f7}
.ins-title-row{display:flex;flex-direction:column;gap:8px}
.ins-title{font-size:14px;color:#13314c;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ins-loz{display:inline-flex;align-items:center;gap:6px;height:24px;padding:0 8px;border-radius:4px;font-size:12px;color:#13314c;white-space:nowrap;flex-shrink:0;align-self:flex-start}
.ins-loz-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ins-body{font-size:13px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ins-pane .ins-body{white-space:normal;overflow:visible;text-overflow:unset}
.link-btn{background:none;border:none;color:#008dd5;font-size:14px;padding:0}
.link-btn:hover{text-decoration:underline}
.link-btn.sm{font-size:13px}
.bc-card-footer{display:flex;align-items:center;justify-content:space-between}
.bc-card-hover-btn{opacity:0;transition:opacity .15s;cursor:pointer}
.bc-card:hover .bc-card-hover-btn{opacity:1}

/* ── SVG icons ── */
svg.ico{display:block;flex-shrink:0}

/* ═══════════════════════════════════════════ */
/* TRANSACTION REVIEW                          */
/* ═══════════════════════════════════════════ */
.tr-layout{flex:1;display:flex;min-height:0;overflow:hidden}

/* Sidebar */
.tr-sb{width:360px;background:#fff;border-right:1px solid #cedbe7;display:flex;flex-direction:column;flex-shrink:0;min-height:0;overflow:hidden;height:100%}
.tr-sb.coll{width:48px}
.tr-sb-hdr{padding:14px 16px 10px;display:flex;align-items:center;border-bottom:1px solid #e3edf5;flex-shrink:0}
.tr-sb-hdr.coll{justify-content:center;padding:0;height:48px}
.tr-sb-title{font-size:16px;font-weight:600;color:#13314c}
.tr-sb-search{padding:10px 16px;flex-shrink:0}
.tr-sb-search input{width:100%;height:36px;border:1px solid #cedbe7;border-radius:4px;padding:0 32px 0 10px;font-size:13px;font-style:italic;color:#13314c;background:#f5f8fa;outline:none}
.tr-sb-list{flex:1;overflow-y:auto;min-height:0}
.tr-sb-sec{padding:10px 16px 6px;display:flex;align-items:center;justify-content:space-between;font-size:13px;color:#5f7180}
.tr-sb-div{height:1px;background:#e3edf5;margin:6px 16px}
.tr-sb-foot{padding:10px 16px;border-top:1px solid #e3edf5;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}

.sb-row{padding:10px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;border-left:3px solid transparent;transition:background .1s}
.sb-row:hover{background:#f8fbfd}
.sb-row.act{background:#e8f4fc;border-left-color:#008dd5}
.sb-row.login-bg{background:#fdf1f1}
.sb-row.login-bg:hover{background:#fbe8e8}
.sb-row.coll{padding:0;width:48px;height:48px;justify-content:center;position:relative}
.sb-row-info{flex:1;min-width:0}
.sb-name-row{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.sb-name{font-size:13px;color:#13314c;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.sb-name.bold{font-weight:600}
.sb-status{display:flex;align-items:center;gap:5px;flex-shrink:0}
.sb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sb-dot.ok{background:#6eb744}
.sb-dot.warn{background:#f5a623}
.sb-dot.err{background:#eb343c}
.sb-status-lbl{font-size:12px;color:#888;font-style:italic}
.sb-bank{font-size:12px;color:#9aa7b3}
.sb-err-lbl{display:flex;align-items:center;gap:3px;font-size:12px;color:#eb343c;margin-left:6px}
.sb-bal{font-size:14px;font-weight:600;color:#13314c;flex-shrink:0}
.sb-coll-dot{position:absolute;top:9px;right:9px;width:8px;height:8px;border-radius:50%}

/* Right panel */
.tr-right{flex:1;min-width:0;min-height:0;display:flex;flex-direction:column;overflow:hidden}
.tr-inner{flex:1;min-height:0;padding:12px 16px;display:flex;flex-direction:column;gap:10px;overflow:hidden}

/* Account header strip */
.acct-hdr{background:#fff;border:1px solid #cedbe7;border-radius:4px;padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.acct-hdr-name{font-size:15px;font-weight:600;color:#13314c}
.acct-hdr-bank{font-size:14px;color:#888}
.acct-hdr-sync{display:flex;align-items:center;gap:4px;color:#aaa;font-size:13px;margin-left:4px}

/* Summary strip */
.sum-strip{background:#fff;border:1px solid #cedbe7;border-radius:4px;padding:10px 20px;display:flex;align-items:center;flex-shrink:0;justify-content:space-between}
.sum-cell{display:flex;align-items:center;gap:6px;flex:1;justify-content:space-between;padding:0 20px;border-right:1px solid #e3edf5}
.sum-cell:first-child{padding-left:0}
.sum-cell:last-child{border-right:none;padding-right:0}
.sum-lbl{font-size:14px;color:#666;white-space:nowrap}
.sum-val{font-size:15px;font-weight:600;color:#13314c;white-space:nowrap}
.sum-dot{width:9px;height:9px;border-radius:50%;background:#f5a623;flex-shrink:0;margin-left:auto}

/* Filter row */
.flt-row{display:flex;align-items:flex-end;gap:14px;flex-shrink:0;flex-wrap:wrap}
.flt-lbl{font-size:12px;color:#008dd5;display:block;margin-bottom:3px}
.flt-input{height:34px;border:1px solid #cedbe7;border-radius:4px;padding:0 8px;font-size:13px;color:#13314c;background:#fff;outline:none;width:200px;font-style:italic}
.flt-input::placeholder{color:#999}
.flt-date{height:34px;border:1px solid #cedbe7;border-radius:4px;padding:0 8px;font-size:13px;color:#13314c;background:#fff;outline:none;width:100px}
.flt-sel{height:34px;border:1px solid #cedbe7;border-radius:4px;padding:0 8px;font-size:13px;color:#13314c;background:#fff;outline:none;cursor:pointer;width:160px;appearance:none}
.flt-sel-wrap{position:relative}
.flt-sel-wrap svg{position:absolute;right:6px;top:50%;transform:translateY(-50%);pointer-events:none}
/* Custom Select */
.csel{position:relative;display:inline-block}
.csel-btn{height:34px;border:1px solid #cedbe7;border-radius:4px;padding:0 10px;font-size:13px;color:#13314c;background:#fff;cursor:pointer;display:inline-flex;align-items:center;gap:4px;white-space:nowrap;user-select:none}
.csel-btn svg{flex-shrink:0;pointer-events:none}
.csel-menu{position:absolute;top:calc(100% + 3px);left:0;min-width:100%;background:#fff;border:1px solid #cedbe7;border-radius:4px;box-shadow:0 4px 16px rgba(19,49,76,.13);z-index:500;overflow:hidden;display:none}
.csel-menu.open{display:block}
.csel-item{padding:0 14px;height:36px;display:flex;align-items:center;font-size:13px;color:#13314c;cursor:pointer;white-space:nowrap}
.csel-item:hover{background:#f0f4f7}
.csel-item.csel-sel{background:#008dd5;color:#fff}
.csel-item.csel-sel:hover{background:#0079bb}
.csel-btn--acct{font-weight:600;color:#008dd5;border:none;padding-left:0;background:none}
.flt-toggle{margin-left:auto;display:flex;height:36px}
.flt-toggle-btn{padding:0 16px;border:1px solid #cedbe7;font-size:13px;cursor:pointer;background:#fff;color:#666;font-weight:400;position:relative}
.flt-toggle-btn:first-child{border-radius:4px 0 0 4px}
.flt-toggle-btn:not(:first-child){margin-left:-1px}
.flt-toggle-btn:last-child{border-radius:0 4px 4px 0}
.flt-toggle-btn.act{background:#ebf1f5;border-color:#008dd5;font-weight:600;color:#666;z-index:1}

/* Transaction table */
.tx-wrap{flex:1;min-height:0;border:1px solid #cedbe7;border-radius:4px;overflow:hidden;display:flex;flex-direction:column}
.tx-hdr{display:grid;background:#5a6168;flex-shrink:0}
.tx-hdr-cell{padding:0 10px;height:36px;display:flex;align-items:center;gap:4px;color:#fff;font-size:13px;font-weight:400}
.tx-hdr-cell.r{justify-content:flex-end}
.tx-rows{flex:1;overflow-y:auto;background:#fff;min-height:0}
.tx-row-wrap{border-bottom:1px solid #eef2f7}
.tx-main-row{display:grid;cursor:pointer;transition:background .1s;min-height:40px;align-items:center}
.tx-main-row:hover{background:#f7fbff!important}
.tx-main-row.exp{background:#eaf4fc!important}
.tx-cell{padding:0 10px;display:flex;align-items:center;height:100%;overflow:hidden}
.tx-cell.r{justify-content:flex-end}
.tx-cell.center{justify-content:center}
.tx-cell span.amt{font-size:13px;color:#13314c;font-variant-numeric:tabular-nums}
.tx-cell span.desc{font-size:13px;color:#13314c;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-cell span.date{font-size:13px;color:#13314c}
.tx-rm-matched{display:flex;align-items:center;gap:6px}
.tx-rm-link{background:none;border:none;color:#008dd5;font-size:13px;text-align:left;cursor:pointer;padding:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tx-rm-link:hover{text-decoration:underline}
.tx-rm-orion{display:flex;align-items:center;gap:5px;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tx-rm-none{font-size:13px;color:#aaa;font-style:italic;white-space:nowrap}
.tx-rm-multi{display:flex;align-items:center;gap:6px;font-size:13px}
.match-badge{display:inline-flex;align-items:center;gap:2px}
.match-badge-btn{padding:0;background:none;border:none;font-size:13px;color:#008dd5;font-weight:400;display:flex;align-items:center;gap:4px}
.match-badge-btn:hover{text-decoration:underline}
.match-badge-arr{width:16px;background:none;border:none;display:flex;align-items:center;justify-content:center}
.tx-view-btn{padding:0;background:none;border:none;font-size:13px;color:#008dd5;font-weight:400;cursor:pointer}
.tx-view-btn:hover{text-decoration:underline}

/* Expanded section */
.tx-exp-wrap{background:#f5f8fa;border-top:1px solid #e3edf5}
.tx-tab-body{padding:8px 36px 16px;display:flex;flex-direction:column;gap:12px}
.seg-toggle{display:flex;width:138px}
.seg-toggle button{flex:1;height:24px;border:1px solid #cedbe7;background:#fff;font-size:12px;color:#666;font-weight:400;cursor:pointer;padding:0 16px;white-space:nowrap}
.seg-toggle button:first-child{border-radius:4px 0 0 4px;border-right:none}
.seg-toggle button:last-child{border-radius:0 4px 4px 0}
.seg-toggle button.act{background:#ebf1f5;border-color:#008dd5;font-weight:600}

/* Orion message */
.orion-msg{display:flex;align-items:center;gap:8px;font-size:13px;color:#13314c}

/* Match sub-table */
.sub-tbl{border:1px solid #cedbe7;border-radius:4px;overflow:hidden;background:#fff}
.sub-tbl-hdr{display:grid;background:#fff;border-bottom:1px solid #e3edf5;min-height:32px;align-items:center}
.sub-tbl-hdr-cell{padding:0 10px;font-size:12px;color:#666;font-weight:500;display:flex;align-items:center;gap:4px}
.sub-tbl-row{display:grid;border-bottom:1px solid #eef2f7;min-height:38px;align-items:center}
.sub-tbl-row:last-child{border-bottom:none}
.sub-tbl-row.sel{background:#f0f8fd}
.sub-tbl-row:hover{background:#f0f8fd;cursor:pointer}
.sub-tbl-cell{padding:0 10px;font-size:13px;color:#13314c}
.sub-tbl-cell.r{text-align:right;font-weight:600}
.radio-dot{width:16px;height:16px;border-radius:50%;border:2px solid #aaa;flex-shrink:0}
.radio-dot.sel{border:5px solid #008dd5}

/* Action buttons */
.act-btns{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.btn-primary{height:32px;padding:0 16px;background:#008dd5;color:#fff;border:none;border-radius:4px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:5px}
.btn-primary:hover{background:#0079b8}
.btn-primary:disabled{background:#8ec8e5;cursor:not-allowed}
.btn-primary:disabled:hover{background:#8ec8e5}
.tt-wrap{position:relative;display:inline-flex}

.at-tbl-foot{display:flex;align-items:center;gap:20px;padding:8px 10px;border-top:2px solid #cedbe7;background:#f5f8fa}
.at-tbl-foot-btn{font-size:12px;color:#008dd5;background:none;border:none;cursor:pointer;font-family:Roboto,sans-serif;display:flex;align-items:center;gap:4px;padding:0;white-space:nowrap}
.at-tbl-foot-btn.muted{color:#9aa7b3;cursor:default}
.at-tbl-total{margin-left:auto;font-size:13px;font-weight:500;color:#13314c}
.at-footer{height:48px;border-top:1px solid #cedbe7;display:flex;align-items:center;justify-content:flex-end;gap:8px;padding:0 16px;flex-shrink:0;background:#fff}
.at-cancel{height:36px;padding:0 16px;background:#fff;border:1px solid #008dd5;border-radius:4px;font-size:14px;color:#008dd5;cursor:pointer;font-family:Roboto,sans-serif}
/* ── Split Transaction ── */
.split-alloc{padding:8px 16px 12px;background:#f5f8fa;flex-shrink:0}
.split-alloc-row{display:flex;align-items:center;justify-content:space-between;font-size:13px;color:#666;margin-bottom:6px;min-height:32px}
.split-alloc-right{display:flex;align-items:center;gap:16px}
.split-rem{color:#666}
.split-rem.neg{color:#eb343c}
.split-add-btn{height:32px;padding:0 14px;display:inline-flex;align-items:center;gap:6px;font-size:13px}
.split-bar{height:8px;background:#e5e5e5;border-radius:200px;overflow:hidden}
.split-bar-fill{height:8px;background:#008dd5;border-radius:200px;transition:width .15s}
.split-empty{flex:1;display:flex;align-items:center;justify-content:center}
.split-empty .split-add-btn{height:36px;padding:0 16px;font-size:14px}
.split-item{background:#fff;border:1px solid #cedbe7;border-radius:4px;margin-bottom:12px;overflow:hidden;flex-shrink:0}
.split-item-hdr{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid #e3edf5}
.split-item-num{font-size:14px;font-weight:600;color:#13314c}
.split-item-ico{background:none;border:none;display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:4px;color:#9aa7b3;cursor:pointer}
.split-item-ico:hover{background:#f5f8fa}
.split-item-body{padding:16px}
/* ── Find Transaction Matches ── */
.fm-sub{display:flex;align-items:flex-end;justify-content:space-between;padding:12px 16px 0;background:#f2f2f2;flex-shrink:0;gap:16px}
.fm-sub-title{font-size:14px;font-weight:600;color:#13314c;margin-bottom:8px}
.fm-orion{display:flex;align-items:center;gap:6px;font-size:13px;color:#666}
.fm-orion a{color:#008dd5;text-decoration:none;margin-left:4px}
.fm-prog{display:flex;align-items:center;gap:16px}
.fm-prog-bar{width:240px;height:12px;background:#e5e5e5;border-radius:200px;overflow:hidden;flex-shrink:0}
.fm-prog-fill{height:12px;background:#008dd5;border-radius:200px;transition:width .15s}
.fm-prog-fill.done{background:#6eb744}
.fm-prog-label{font-size:12px;color:#666;text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
.fm-filters{display:flex;align-items:flex-end;gap:16px;padding:12px 16px;background:#f2f2f2;flex-shrink:0}
.fm-fld{display:flex;flex-direction:column;gap:4px;flex:1;min-width:0}
.fm-fld label{font-size:14px;color:#008dd5}
.fm-fld .fm-input{height:36px;width:100%;border:1px solid #008dd5;border-radius:4px;background:#fff;padding:0 8px;font-size:14px;color:#13314c;font-family:'Roboto',sans-serif;box-sizing:border-box}
.fm-fld .fm-input::placeholder{color:#b3b3b3;font-style:italic}
.fm-fld .fm-select{height:36px;width:100%;border:1px solid #008dd5;border-radius:4px;background:#fff url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 24 24' fill='%2313314c'%3E%3Cpath d='M7 10l5 5 5-5z'/%3E%3C/svg%3E") no-repeat right 4px center;padding:0 28px 0 8px;font-size:14px;color:#13314c;font-family:'Roboto',sans-serif;appearance:none;box-sizing:border-box}
.fm-date-wrap{display:flex;height:36px;border:1px solid #008dd5;border-radius:4px;overflow:hidden;width:100%;box-sizing:border-box}
.fm-date-field{flex:1;border:none;background:#fff;padding:0 8px;font-size:14px;color:#13314c;font-family:'Roboto',sans-serif;min-width:0;outline:none}
.fm-date-icon{width:28px;background:#f5f8fa;border-left:1px solid #008dd5;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fm-date-filter{width:28px;background:#f5f8fa;border-left:1px solid #008dd5;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer}
.fm-fld{display:flex;flex-direction:column;gap:4px}
.fm-fld label{font-size:12px;color:#008dd5;font-weight:500}
.fm-tbl-wrap{flex:1;overflow-y:auto;min-height:0;padding:0 16px 12px;background:#f2f2f2}
#find-match-root .at-modal{background:#f2f2f2}
.fm-tbl{width:100%;border-collapse:collapse;font-size:13px;background:#fff}
.fm-tbl thead th{background:#596775;color:#fff;font-size:12px;font-weight:500;padding:0 10px;height:32px;text-align:left;white-space:nowrap}
.fm-tbl thead th.r{text-align:right}
.fm-tbl tbody td{padding:0 10px;height:40px;color:#13314c;border-bottom:1px solid #eef2f7;white-space:nowrap}
.fm-tbl tbody td.r{text-align:right;font-weight:600}
.fm-tbl tbody tr:hover{background:#f5f8fa}
.fm-tbl tbody tr.sel{background:#eaf5fb}
.fm-cb{cursor:pointer}
</style>
</head>

function acctTxs(id) {
  return TRANSACTIONS_BY_ACCT[id || S.activeId] || [];
}
// Find a transaction (and its owning account) across every account feed — needed
// when acting on a transaction from a screen whose account differs from S.activeId
// (e.g. the reconcile kebab menu, which operates on REC_STATE.acctId).
function txAcctId(txId) {
  for (const id in TRANSACTIONS_BY_ACCT) {
    const f = TRANSACTIONS_BY_ACCT[id];
    if (f && f.some(t => t.id === txId)) return id;
  }
  return S.activeId;
}
function findTxGlobal(txId) {
  return (TRANSACTIONS_BY_ACCT[txAcctId(txId)] || []).find(t => t.id === txId) || null;
}
// Live "to review" count for an account = feed items not yet matched or excluded.
function acctReview(a) {
  const f = TRANSACTIONS_BY_ACCT[a.id];
  if (!f || !f.length) return 0;
  return f.filter(t => !S.matchedIds.has(t.id) && !S.excludedIds.has(t.id)).length;
}
function acctReviewAmt(a) {
  const f = TRANSACTIONS_BY_ACCT[a.id];
  if (!f || !f.length) return 0;
  return f.filter(t => !S.matchedIds.has(t.id) && !S.excludedIds.has(t.id))
          .reduce((s, t) => s + (t.deposit != null ? t.deposit : (t.payment || 0)), 0);
}

// Custom select dropdown
let _cselOpenId = null;
const _cselCbs = {};
function cSel(id, value, options, onChange, extraStyle='') {
  const opts = options.map(o => typeof o === 'string' ? {value:o, label:o} : o);
  const current = opts.find(o=>o.value===value) || opts[0];
  if (onChange) _cselCbs[id] = typeof onChange === 'function' ? onChange : (v) => (new Function('value', onChange))(v);
  return `<div class="csel" style="${extraStyle}" id="csel-${id}">
    <div class="csel-btn" onclick="event.stopPropagation();_cselToggle('${id}')">
      <span id="csel-lbl-${id}">${current ? current.label : ''}</span>
      ${ic('M7 10l5 5 5-5z', 15, '#666')}
    </div>
    <div class="csel-menu${_cselOpenId===id?' open':''}" id="csel-menu-${id}">
      ${opts.map(o=>`<div class="csel-item${o.value===value?' csel-sel':''}" data-val="${o.value.replace(/"/g,'&quot;')}" onclick="event.stopPropagation();_cselPick('${id}',this.dataset.val)">${o.label}</div>`).join('')}
    </div>
  </div>`;
}
function _cselToggle(id) {
  _cselOpenId = _cselOpenId === id ? null : id;
  document.querySelectorAll('.csel-menu').forEach(m => m.classList.remove('open'));
  if (_cselOpenId) {
    const m = document.getElementById('csel-menu-'+_cselOpenId);
    if (m) m.classList.add('open');
  }
}
function _cselPick(id, value) {
  _cselOpenId = null;
  document.querySelectorAll('.csel-menu').forEach(m => m.classList.remove('open'));
  if (_cselCbs[id]) _cselCbs[id](value);
}
document.addEventListener('click', () => {
  if (_cselOpenId) {
    _cselOpenId = null;
    document.querySelectorAll('.csel-menu').forEach(m => m.classList.remove('open'));
  }
});

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
  const titles = { bc:'Banking Center', tr:'Transaction Review', br:'Bank Register', cr:'Credit Card Register', rec:'Smart Reconciliation' };
  document.getElementById('ctx-title').textContent = titles[id] || id;
  document.getElementById('ctx-extra').innerHTML = (id === 'tr' || id === 'br' || id === 'cr' || id === 'rec')
    ? `<button onclick="showScreen('bc')" style="background:none;border:none;color:#fff;font-size:14px;display:flex;align-items:center;gap:4px;cursor:pointer;padding:0;font-family:'Roboto',sans-serif">Banking Center <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M8 5v2.5l-3.5 3.5 3.5 3.5V17l-6-6 6-6zm8 0l6 6-6 6v-2.5l3.5-3.5-3.5-3.5V5z" style="display:none"/><path d="M16.01 11H4v2h12.01v3L20 12l-3.99-4v3z"/></svg></button>`
    : '';
  if (id==='bc') renderBC();
  if (id==='tr') renderTR();
  if (id==='br') { if (!BR_STATE.acctId) BR_STATE.acctId = ACCOUNTS.find(a=>a.kind==='bank').id; renderBR(); }
  if (id==='cr') { if (!CR_STATE.acctId) CR_STATE.acctId = ACCOUNTS.find(a=>a.kind==='card').id; renderCR(); }
  if (id==='rec') { if (!REC_STATE.acctId) seedReconcile(ACCOUNTS.find(a=>a.kind==='bank').id); renderReconcile(); }
  _ubSetView(_UB_SCREEN_TO_SLUG[id] || id);
}

function fmtSync(min) {
  if (min === null) return '';
  if (min < 60) return min + 'm';
  if (min < 1440) return Math.round(min/60) + 'h';
  return Math.round(min/1440) + 'd';
}

function visibleOrderedAccounts() {

}

function renderInsights() {

  const active = INSIGHTS.filter(ins => !ins._dismissed);
  const CLOSE_ICO = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path fill="#999" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>`;

  function insCard(ins) {
    const vizHtml = insViz(ins);
    const whyHtml = ins.callout ? `<div class="ins-why" onclick="toggleWhyTip(event,'${ins.id}')">${INFO_ICO}<span>${ins.callout.label}</span>${ins.callout.detail ? `<div class="ins-why-tip" id="why-tip-${ins.id}">${ins.callout.detail}</div>` : ''}</div>` : '';
    return `<div class="ins-card" style="border-left:2px solid ${ins.borderColor}">

          <span class="ins-loz" style="background:${ins.lozBg}"><span class="ins-loz-dot" style="background:${ins.dotColor}"></span>${ins.lozTag}</span>

        <div class="ins-body">${ins.body}</div>
        ${vizHtml ? `<div>${vizHtml}</div>` : ''}
        ${whyHtml ? `<div class="ins-action-row">${whyHtml}</div>` : ''}
      </div>
    </div>`;
  }

  const sections = [
    {key:'action', label:'Needs Action Now'},
    {key:'watch', label:'Watch'},
    {key:'forecast', label:'Forecast'},

        </button>
      </div>
      <div class="ins-pane-body">${bodyHtml}</div>
    </div>`;
}

/* ─ Right panel ─ */
function renderRight() {
  const acct = ACCOUNTS.find(a=>a.id===S.activeId);
  const allTxs = acctTxs();
  const unmatchedCount = allTxs.filter(t=>!S.matchedIds.has(t.id) && !S.excludedIds.has(t.id)).length;
  const matchedCount = allTxs.filter(t=>S.matchedIds.has(t.id)).length;
  const excludedCount = allTxs.filter(t=>S.excludedIds.has(t.id)).length;
  const syncLbl = acct.syncedMin===0?'Just now':`${acct.syncedMin}m ago`;

  // Live recompute: each resolved (matched or excluded) bank item the book catches up on
  // closes the gap. Book += deposit / −= payment for every resolved item.
  const resolvedNet = allTxs.reduce((s,t)=> (S.matchedIds.has(t.id)||S.excludedIds.has(t.id))
    ? s + (t.deposit!=null ? t.deposit : (t.payment!=null ? -t.payment : 0)) : s, 0);
  const liveInRm = acct.inRm + resolvedNet;
  const liveDiff = +(liveInRm - acct.bankBalance).toFixed(2);

  const diffColor = liveDiff<0?'#eb343c': liveDiff>0?'#426e29':'#13314c';
  const diffVal = liveDiff===0?'$0.00':`${liveDiff<0?'-':'+'}${fmt(Math.abs(liveDiff))}`;

  let html = `
  <!-- Account header -->
  <div class="acct-hdr">
    ${ic(P.bank,16,'#13314c')}
    <span class="acct-hdr-name">${acct.gl}</span>
    ${acct.bankName ? `<span class="acct-hdr-bank">${acct.bankName}</span>` : ''}
    ${acct.last4 ? `<span class="acct-hdr-bank">••••${acct.last4}</span>` : ''}
    ${acct.syncedMin != null ? `<div class="acct-hdr-sync">${ic(P.refresh,14,'#aaa')}<span>${syncLbl}</span></div>` : ''}
    <div style="margin-left:auto;display:flex;align-items:center;gap:10px">
      <button style="background:none;border:none;display:flex;align-items:center;gap:5px;color:#008dd5;font-size:13px" onclick="${acct.kind==='card'?`openCR('${acct.id}')`:`openBR('${acct.id}')`}">${acct.kind==='card'?'Credit Card Register':'Bank Register'}</button>
      <span class="tt-wrap"${unmatchedCount>0?` data-tip="${unmatchedCount} bank transaction${unmatchedCount!==1?'s are':' is'} still in review, and this account cannot be reconciled."`:''}>
        <button class="btn-primary" style="height:34px;font-size:13px"${unmatchedCount>0?' disabled':''} onclick="openReconcile('${acct.id}')">Reconcile</button>
      </span>
    </div>

/* ─ Transaction rows ─ */
function renderTxRows() {
  if (!document.getElementById('tx-rows')) return;
  let txs = [...acctTxs()];
  const search = S.search.toLowerCase();
  if (search) txs = txs.filter(t=>t.desc.toLowerCase().includes(search));
  if (S.filterBy==='deposits') txs = txs.filter(t=>t.deposit);
  if (S.filterBy==='payments') txs = txs.filter(t=>t.payment);
  if (S.view==='unmatched') txs = txs.filter(t=>!S.matchedIds.has(t.id) && !S.excludedIds.has(t.id));
  else if (S.view==='matched') txs = txs.filter(t=>S.matchedIds.has(t.id));
  else if (S.view==='excluded') txs = txs.filter(t=>S.excludedIds.has(t.id));

  const el = document.getElementById('tx-rows');
  if (!el) return;
  if (!txs.length) {
    el.innerHTML = '<div style="padding:40px 20px;text-align:center;color:#aaa;font-size:13px">No transactions match your filters.</div>';
    return;
  }
  el.innerHTML = txs.map(tx => renderTxRow(tx)).join('');
}

function renderTxRow(tx) {

  /* RM cell */
  let rmCell;

    </div>`;
  }

  // Matched rows have no dropdown — clicking opens the slideout instead.
  const rowClick = matched ? `openSlideout('${tx.id}')` : `toggleRow('${tx.id}','${tx.matchStatus==='none'?'add':'match'}')`;
  const CHEV_DOWN_MAT = 'M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z';
  const CHEV_UP_MAT = 'M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z';
  const chevronCell = matched ? ic(P.check,16,'#6eb744') : ic(exp?CHEV_UP_MAT:CHEV_DOWN_MAT,20,'#008dd5');

  let html = `<div class="tx-row-wrap" id="row-${tx.id}">
    <div class="${'tx-main-row'}${exp?' exp':''}" style="${GRID}" onclick="${rowClick}">
      <div class="tx-cell center">${chevronCell}</div>
      <div class="tx-cell"><span class="date">${tx.date}</span></div>
      <div class="tx-cell" style="overflow:hidden"><span class="desc">${tx.desc}</span></div>
      <div class="tx-cell r"><span class="amt">${tx.deposit?fmtN(tx.deposit):''}</span></div>
      <div class="tx-cell r"><span class="amt">${tx.payment?fmtN(tx.payment):''}</span></div>
      <div class="tx-cell" style="overflow:hidden">${rmCell}</div>

    } else if (tx.matchStatus==='match') {

// Register-style short code for a "<Type> <number>[: Name]" reference string,
// matching the compact Reference column convention used in the Bank Register
// (e.g. "D1621" for deposits, "1042" for checks, "J1573" for journals).
function regRefCode(ref) {
  if (!ref) return ref;
  const m = ref.match(/^(Deposit|Journal|Check|Bill)\s+(\w+)/);
  if (!m) return ref.split(':')[0].trim();
  const prefix = { Deposit: 'D', Journal: 'J', Check: '', Bill: 'B' }[m[1]] ?? '';
  return prefix + m[2];
}

// Derive a structured match row from a plain `rmLink` string when the richer
// `matchRow` object isn't present (secondary accounts only carry `rmLink`).
// rmLink format: "MM/DD/YYYY <Type Ref>: <Name>"  e.g. "06/13/2026 Deposit 7201: A. Chen"
function matchRowFromTx(tx) {
  if (tx.matchRow) return tx.matchRow;
  const acct = ACCOUNTS.find(a => (TRANSACTIONS_BY_ACCT[a.id] || []).some(t => t.id === tx.id));
  const link = tx.rmLink || '';
  const sp = link.indexOf(' ');
  const date = sp > 0 ? link.slice(0, sp) : (tx.date || '');
  const rest = sp > 0 ? link.slice(sp + 1) : link;
  const colon = rest.indexOf(':');
  const ref = colon > 0 ? rest.slice(0, colon).trim() : rest.trim();
  const comment = colon > 0 ? rest.slice(colon + 1).trim() : '';
  return {
    date, ref, account: acct ? acct.gl : '—', property: '—', comment,
    amount: tx.deposit != null ? tx.deposit : (tx.payment != null ? tx.payment : 0),
  };
}

/* ── Add Transaction overlay (single or multi-line) ── */
let _addTxOpen = false;
let _addTxId = null;
let _addTxItems = [];
let _addTxSeq = 0;
let _addTxMenuOpen = false;
let _addTxMenuBound = false;

// Friendly labels for the "+ Add Transaction" dropdown (Write Check / Add Bill / …).
function addTxTypeVerb(type) {
  const m = { 'Check':'Write Check', 'Bill':'Add Bill', 'Journal Entry':'Add Journal Entry',
    'Deposit':'Make Deposit', 'Receipt':'Add Receipt',
    'Credit Card Charge':'Add Credit Card Transaction', 'Credit Card Credit':'Add Credit Card Transaction' };
  return m[type] || ('Add ' + type);
}
function toggleAddTxMenu() {
  _addTxMenuOpen = !_addTxMenuOpen;
  renderAddTx();
}
// Add a new line of a chosen type; collapse all existing lines (per Figma — the
// prior transactions collapse to a summary while you work on the new one).
function addAddTxItemType(type) {
  const remaining = Math.max(0, addTxTotal() - addTxAllocated());
  _addTxItems.forEach(it => it.collapsed = true);
  _addTxItems.push({ id: ++_addTxSeq, type, amount: remaining, collapsed: false });
  _addTxMenuOpen = false;
  renderAddTx();
}
// One-line summary shown when a transaction line is collapsed.
function addTxSummary(it, tx, acct) {
  const props = ['Hawthorne Court Apartments','Pearl District Lofts','Alberta Commons','Sellwood Row'];
  const prop = props[(it.id || 0) % props.length];
  const desc = tx.desc || '';
  const isDep = tx.deposit != null;
  let party = desc.replace(/^(ACH|CHECK|POS|WIRE|ZELLE|ZEGO|EFT|DEBIT|CREDIT|DEPOSIT|PAYMENT|INBOUND|OUTBOUND|BATCH)\b/gi,'')
    .replace(/\b\d{3,}\b/g,'').replace(/\b\d{4}\b/g,'').replace(/—/g,'').trim();
  party = party.split(/\s{2,}|\s-\s/)[0].trim() || (isDep ? 'Tenant' : 'Vendor');
  const label = isDep ? 'Tenant' : 'Vendor';
  return `Property: ${prop} &nbsp;|&nbsp; ${label}: ${party} &nbsp;|&nbsp; Amount: ${(parseFloat(it.amount)||0).toFixed(2)} &nbsp;|&nbsp; Date: ${tx.date||''}`;
}

function getTxTypes(acct, tx) {
  const isCard = acct && acct.kind === 'card';
  const isPayment = tx.payment != null;
  if (isCard) {
    return isPayment
      ? ['Credit Card Charge']
      : ['Credit Card Credit', 'Check'];
  }
  // bank account
  return isPayment
    ? ['Bill', 'Check', 'Journal Entry']
    : ['Deposit', 'Journal Entry'];
}

function _addTx() { return acctTxs().find(t=>t.id===_addTxId); }
function addTxTotal() {
  const tx = _addTx();
  if (!tx) return 0;
  return tx.payment != null ? tx.payment : (tx.deposit != null ? tx.deposit : 0);
}
function addTxItemAmount(i) {
  if (i.type === 'Deposit') {
    const selTotal = i.depSel ? [...i.depSel].reduce((s,idx)=> s + (DEP_PAYMENTS[idx]?.amount||0), 0) : 0;
    const oiTotal = (i.otherIncome||[]).reduce((s,r)=> s + (parseFloat(r.amount)||0), 0);
    return selTotal + oiTotal;
  }
  return parseFloat(i.amount)||0;
}
function addTxAllocated() {
  return _addTxItems.reduce((s,i)=> s + addTxItemAmount(i), 0);
}
function addTxBalanced() {
  const hasDeposit = _addTxItems.some(i=>i.type==='Deposit');
  if (_addTxItems.length <= 1 && !hasDeposit) return true;
  return Math.abs(addTxTotal() - addTxAllocated()) < 0.005;
}
// Deposit payment selection toggles → update allocation in place.
function toggleDepRow(itemId, idx, checked) {
  const it = _addTxItems.find(i=>i.id===itemId);
  if (!it) return;
  if (!it.depSel) it.depSel = new Set();
  if (checked) it.depSel.add(idx); else it.depSel.delete(idx);
  // Sync the header select-all checkbox without a full re-render.
  const allCb = document.querySelector('.dep-all-cb');
  if (allCb) {
    allCb.checked = it.depSel.size === DEP_PAYMENTS.length;
    allCb.indeterminate = it.depSel.size > 0 && it.depSel.size < DEP_PAYMENTS.length;
  }
  recalcAddTxAlloc();
}
function toggleDepAll(itemId, checked) {
  const it = _addTxItems.find(i=>i.id===itemId);
  if (!it) return;
  it.depSel = checked ? new Set(DEP_PAYMENTS.map((_,i)=>i)) : new Set();
  document.querySelectorAll('.dep-row-cb').forEach(cb => { cb.checked = checked; });
  recalcAddTxAlloc();
}
// Other Income lines on a Deposit — ad-hoc non-tenant income (vendor refunds,
// laundry income, etc.) added alongside the tenant payments being deposited.
function addOtherIncomeRow(itemId) {
  const it = _addTxItems.find(i=>i.id===itemId);
  if (!it) return;
  if (!it.otherIncome) it.otherIncome = [];
  it.otherIncome.push({ property:'', unit:'', account:'', reference:'', memo:'', party:'', amount:'0.00' });
  renderAddTx();
}
function removeOtherIncomeRow(itemId, idx) {
  const it = _addTxItems.find(i=>i.id===itemId);
  if (!it || !it.otherIncome) return;
  it.otherIncome.splice(idx, 1);
  renderAddTx();
}
function setOtherIncomeField(itemId, idx, field, val) {
  const it = _addTxItems.find(i=>i.id===itemId);
  if (!it || !it.otherIncome || !it.otherIncome[idx]) return;
  it.otherIncome[idx][field] = val;
  if (field === 'amount') recalcAddTxAlloc();
}

function openAddTx(txId) {
  _addTxOpen = true;
  _addTxId = txId;
  const tx = findTxGlobal(txId);
  const acct = ACCOUNTS.find(a=>a.id===txAcctId(txId));
  const types = getTxTypes(acct, tx||{});
  const amt = tx ? (tx.payment != null ? tx.payment : (tx.deposit != null ? tx.deposit : 0)) : 0;
  _addTxItems = [{ id: ++_addTxSeq, type: types[0], amount: amt, collapsed: false }];
  renderAddTx();
  _ubOpenOverlaySignal('add-transaction');
}
function closeAddTx() {
  _addTxOpen = false;
  document.getElementById('add-tx-root').innerHTML = '';
  _ubCloseOverlaySignal();
}
function addAddTxItem() {
  const tx = _addTx();
  const acct = ACCOUNTS.find(a=>a.id===S.activeId);
  const remaining = Math.max(0, addTxTotal() - addTxAllocated());
  const types = getTxTypes(acct, tx||{});
  _addTxItems.push({ id: ++_addTxSeq, type: types[0], amount: remaining, collapsed: false });
  renderAddTx();
}
function removeAddTxItem(id) {
  _addTxItems = _addTxItems.filter(i=>i.id!==id);
  if (_addTxItems.length && !_addTxItems.some(i=>!i.collapsed)) _addTxItems[_addTxItems.length-1].collapsed = false;
  renderAddTx();
}
function setAddTxItemType(id, type) { const it=_addTxItems.find(i=>i.id===id); if(it) it.type=type; renderAddTx(); }
function toggleAddTxItem(id) { const it=_addTxItems.find(i=>i.id===id); if(it) it.collapsed=!it.collapsed; renderAddTx(); }
function setAddTxItemAmount(id, val) {
  const it = _addTxItems.find(i=>i.id===id);
  if (it) it.amount = val;
  recalcAddTxAlloc();
}
// Update the allocation bar + Save state in place (keeps amount inputs focused).
function recalcAddTxAlloc() {
  const total = addTxTotal();
  const allocated = addTxAllocated();
  const balanced = addTxBalanced();
  const lbl = document.getElementById('addtx-alloc-label');
  if (lbl) lbl.textContent = `${fmtN(allocated)}/${fmtN(total)} allocated`;
  const fill = document.getElementById('addtx-bar-fill');
  if (fill) {
    fill.style.width = (total > 0 ? Math.max(0, Math.min(100, allocated/total*100)) : 0) + '%';
    fill.classList.toggle('done', balanced && allocated >= total - 0.005);
  }
  document.querySelectorAll('.addtx-save').forEach(b => { b.disabled = !balanced; });
}
function confirmAddTx() {
  if (!addTxBalanced()) return;
  const txId = _addTxId;
  closeAddTx();
  const tx = findTxGlobal(txId);
  if (!tx) return;
  S.matchedIds.add(txId); S.expandedId=null;
  renderRight(); renderSidebar(); refreshRecIfActive();
  showToast('Transaction recorded');
  _ubMatchedSignal(txId);
  setTimeout(() => showRulePopup(txId), 400);
}

function addTxFormBody(type, tx, amt, acct, itemId) {
  if (type === 'Bill') return renderAddTxBill(tx, amt, acct, itemId);
  if (type === 'Check') return renderAddTxCheck(tx, amt, acct, itemId);
  if (type === 'Receipt') return renderAddTxReceipt(tx, amt, acct, itemId);
  if (type === 'Deposit') return renderAddTxDeposit(tx, amt, acct, itemId);
  if (type === 'Journal Entry') return renderAddTxJournal(tx, amt, acct, itemId);
  if (type === 'Credit Card Charge') return renderAddTxCCCharge(tx, amt, acct, itemId);
  if (type === 'Credit Card Credit') return renderAddTxCCCredit(tx, amt, acct, itemId);
  return renderAddTxGeneric(tx, amt, acct, itemId);
}
// oninput attribute that keeps the progress bar in sync with a line's amount.
function atAmtBind(itemId) {
  return itemId != null ? ` oninput="setAddTxItemAmount(${itemId},this.value)"` : '';
}

function renderAddTx() {
  const root = document.getElementById('add-tx-root');
  if (!_addTxOpen) { root.innerHTML=''; return; }
  const txs = acctTxs();
  const tx = txs.find(t=>t.id===_addTxId);
  if (!tx) { root.innerHTML=''; return; }

  const acct = ACCOUNTS.find(a=>a.id===txAcctId(_addTxId));
  const availableTypes = getTxTypes(acct, tx);
  const total = addTxTotal();
  const allocated = addTxAllocated();
  const balanced = addTxBalanced();
  const pct = total > 0 ? Math.max(0, Math.min(100, allocated/total*100)) : 0;
  const done = balanced && allocated >= total - 0.005;

  // Always-on allocation progress bar with the "+ Add Transaction" dropdown.
  const progRow = `
    <div class="at-prog-row">
      <div class="at-prog-bar"><div class="at-prog-fill${done?' done':''}" id="addtx-bar-fill" style="width:${pct}%"></div></div>
      <span class="at-prog-label" id="addtx-alloc-label">${fmtN(allocated)}/${fmtN(total)} allocated</span>
      <div style="flex:1"></div>
      <div class="at-addmenu-wrap">
        <button class="at-add-link" onclick="event.stopPropagation();toggleAddTxMenu()">${ic(P.add,15,'#008dd5')} Add Transaction</button>
        ${_addTxMenuOpen ? `<div class="at-add-menu">${availableTypes.map(t=>`<button class="at-add-menu-item" onclick="addAddTxItemType('${t}')">${addTxTypeVerb(t)}</button>`).join('')}</div>` : ''}
      </div>
    </div>`;

  const bodyInner = _addTxItems.map((it) => {
    const amt = parseFloat(it.amount)||0;
    const hdr = `
      <div class="split-item-hdr" onclick="toggleAddTxItem(${it.id})" style="cursor:pointer">
        <button class="split-item-ico" title="${it.collapsed?'Expand':'Collapse'}">${it.collapsed?CHEV_DN_SM:CHEV_UP_SM}</button>
        ${it.collapsed
          ? `<span class="at-item-type">${it.type==='Journal Entry'?'Journal':it.type}</span><span class="at-item-summary">${addTxSummary(it, tx, acct)}</span>`
          : ''}
        <div style="flex:1"></div>
        <button class="split-item-ico" title="Remove" onclick="event.stopPropagation();removeAddTxItem(${it.id})">${TRASH_ICO}</button>
      </div>`;
    return `<div class="split-item">${hdr}${it.collapsed ? '' : `<div class="split-item-body${it.type==='Deposit'?' at-body--picker':''}">${addTxFormBody(it.type, tx, amt, acct, it.id)}</div>`}</div>`;
  }).join('');

  root.innerHTML = `
  <div class="at-overlay" onclick="if(event.target===this)closeAddTx()">
    <div class="at-modal">
      <div class="at-hdr">
        <span class="at-hdr-title">Add Transaction</span>
        <button class="at-hdr-ico" title="Help">${AT_HELP_ICO}</button>
        <button class="at-hdr-ico" onclick="closeAddTx()" title="Close">${AT_X_ICO}</button>
      </div>
      ${txBar(tx, acct)}
      ${progRow}
      <div class="at-body" style="display:flex;flex-direction:column;padding-top:0">${bodyInner}</div>
      <div class="at-footer">
        <button id="save-transaction" class="btn-primary addtx-save" style="height:36px;padding:0 20px" onclick="confirmAddTx()"${balanced?'':' disabled'}>Add</button>
        <button class="at-cancel" onclick="closeAddTx()">Cancel</button>
      </div>
    </div>
  </div>`;

  // Close the type dropdown on any outside click.
  if (!_addTxMenuBound) {
    _addTxMenuBound = true;
    document.addEventListener('click', () => {
      if (_addTxMenuOpen) { _addTxMenuOpen = false; if (_addTxOpen) renderAddTx(); }
    });
  }
}

/* ── Find Transaction Matches overlay ── */
let _findMatchOpen = false;
let _findMatchTxId = null;
let _findMatchSel = new Set();

function fmCandidates(tx) {
  const amt = (tx.payment != null ? tx.payment : tx.deposit) || 0;
  const isDeposit = tx.deposit != null;
  const desc = (tx.desc || '').toUpperCase();

  // Parse a date string MM/DD/YYYY → Date object
  function parseDate(s) {
    const [m,d,y] = s.split('/');
    return new Date(+y, +m-1, +d);
  }
  // Format Date → MM/DD/YYYY
  function fmtDate(dt) {
    const m = String(dt.getMonth()+1).padStart(2,'0');
    const d = String(dt.getDate()).padStart(2,'0');
    return `${m}/${d}/${dt.getFullYear()}`;
  }
  function offsetDate(base, days) {
    const dt = parseDate(base);
    dt.setDate(dt.getDate() + days);
    return fmtDate(dt);
  }

  // Infer tenant last name from desc (e.g. "ACH DEPOSIT RIVERA 0616" → "Rivera")
  function inferTenant() {
    const tenants = ['Rivera','Okafor','Delgado','Nguyen','Park','Reyes','Flores','Walsh','Chen','Henderson','Steinberg','Johnson','Morrison'];
    for (const t of tenants) if (desc.includes(t.toUpperCase())) return t;
    return null;
  }
  // Infer vendor from desc
  function inferVendor() {
    const vendors = [
      ['ROSE CITY PLUMBING','Rose City Plumbing'],['CASCADE HVAC','Cascade HVAC'],
      ['PORTLAND GENERAL','Portland General Electric'],['NW NATURAL','NW Natural'],
      ['STUMPTOWN','Stumptown Landscaping'],['RECOLOGY','Recology'],
      ['ROTO-ROOTER','Roto-Rooter'],['SERVPRO','ServPro'],['ABC SUPPLY','ABC Supply'],
      ['FERGUSON','Ferguson Enterprises'],['STANDARD INSURANCE','Standard Insurance'],
      ['CENTURYLINK','CenturyLink'],['CITY OF PORTLAND','City of Portland'],
      ['MULTNOMAH','Multnomah County'],['ZEGO','Zego (Tenant Payments)'],
    ];
    for (const [key, label] of vendors) if (desc.includes(key)) return label;
    return null;
  }

  const PROPERTIES = ['Hawthorne Court Apartments','Pearl District Lofts','Alberta Commons','Sellwood Row'];
  // Pick a property based on hash of tx.id so it's stable
  function pickProperty() {
    const i = (tx.id || '').split('').reduce((a,c) => a + c.charCodeAt(0), 0) % PROPERTIES.length;
    return PROPERTIES[i];
  }

  const base = tx.date || '06/10/2026';
  const prop = pickProperty();

  if (isDeposit) {
    const tenant = inferTenant();
    const lastName = tenant || 'Tenant';
    const initial = lastName[0];
    const depNum = 8800 + Math.abs((tx.id||'').split('').reduce((a,c)=>a+c.charCodeAt(0),0) % 60);
    return [
      {
        date: base,
        type: 'Receipt',
        ref: `Deposit ${depNum}`,
        property: prop,
        info: `${initial}. ${lastName} — Rent Payment`,
        comment: 'June Rent',
        amount: amt,
      },
      {
        date: offsetDate(base, -2),
        type: 'Charge',
        ref: `Charge ${depNum - 1}`,
        property: prop,
        info: `${initial}. ${lastName} — Rent Charge`,
        comment: 'June Rent (charge)',
        amount: amt,
      },
      {
        date: offsetDate(base, -5),
        type: 'Receipt',
        ref: `Deposit ${depNum - 3}`,
        property: prop,
        info: `${initial}. ${lastName} — Partial Payment`,
        comment: 'Partial — June Rent',
        amount: +(amt * 0.5).toFixed(2),
      },
    ];
  } else {
    // Payment — vendor bill/check
    const vendor = inferVendor() || 'Vendor';
    const billNum = 1000 + Math.abs((tx.id||'').split('').reduce((a,c)=>a+c.charCodeAt(0),0) % 200);
    const checkDesc = desc.includes('CHECK') ? 'Check' : 'Bill';
    return [
      {
        date: base,
        type: checkDesc,
        ref: `Bill ${billNum}`,
        property: prop,
        info: vendor,
        comment: `${vendor} — Service`,
        amount: amt,
      },
      {
        date: offsetDate(base, -3),
        type: 'Bill',
        ref: `Bill ${billNum - 1}`,
        property: prop,
        info: vendor,
        comment: `${vendor} — Prior Invoice`,
        amount: +(amt * 0.95).toFixed(2),
      },
      {
        date: offsetDate(base, 2),
        type: 'Bill',
        ref: `Bill ${billNum + 1}`,
        property: prop,
        info: vendor,
        comment: `${vendor} — Invoice #${billNum + 1}`,
        amount: amt,
      },
    ];
  }
}
function openFindMatch(txId) {
  _findMatchTxId = txId;
  _findMatchOpen = true;
  _findMatchSel = new Set();
  renderFindMatch();
  _ubOpenOverlaySignal('find-match');

function closeFindMatch() {
  _findMatchOpen = false;
  document.getElementById('find-match-root').innerHTML = '';
  _ubCloseOverlaySignal();
}
function toggleFmRow(i) {
  if (_findMatchSel.has(i)) _findMatchSel.delete(i); else _findMatchSel.add(i);
  renderFindMatch();
}
function confirmFindMatch() {
  const id = _findMatchTxId;
  closeFindMatch();
  if (!id) return;
  S.matchedIds.add(id); S.expandedId = null;
  renderRight(); renderSidebar(); refreshRecIfActive();
  showToast('Transaction matched successfully');
  _ubMatchedSignal(id);
}

function renderFindMatch() {
  const root = document.getElementById('find-match-root');
  if (!_findMatchOpen) { root.innerHTML=''; return; }
  const tx = findTxGlobal(_findMatchTxId);
  if (!tx) { root.innerHTML=''; return; }
  const acct = ACCOUNTS.find(a=>a.id===txAcctId(_findMatchTxId));
  const bankAmt = (tx.payment != null ? tx.payment : tx.deposit) || 0;
  const cands = fmCandidates(tx);
  const selected = [..._findMatchSel].reduce((s,i)=> s + (cands[i]?cands[i].amount:0), 0);
  const diff = bankAmt - selected;

// Groups a deposit's payments into the four standard tender types Rent
// Manager tracks on a deposit slip: Cash, Check, Money Orders, Other (ACH,
// wire, card, etc.). `checkNo` is the signal we have to infer tender type.
function paymentMethodBreakdown(payments) {
  const buckets = [['Cash', 0, 0], ['Check', 0, 0], ['Money Orders', 0, 0], ['Other', 0, 0]];
  const idx = { Cash: 0, Check: 1, 'Money Orders': 2, Other: 3 };
  payments.forEach(p => {
    const cn = String(p.checkNo || '').trim().toUpperCase();
    let key = 'Other';
    if (!cn || cn === 'CASH') key = 'Cash';
    else if (/^\d+$/.test(cn)) key = 'Check';
    else if (cn === 'MO' || cn.includes('MONEY ORDER')) key = 'Money Orders';
    const b = buckets[idx[key]];
    b[1]++; b[2] += parseFloat(p.amount) || 0;
  });
  const totalCount = payments.length;
  const totalAmt = buckets.reduce((s, b) => s + b[2], 0);
  return { buckets, totalCount, totalAmt };
}

// Which RM transaction type a matched record represents, inferred from its
// reference string's leading word (e.g. "Journal 4101" -> Journal Entry).
// Falls back to Deposit/Check by cash-flow direction when the ref is generic
// (e.g. a freshly-added record with no descriptive reference yet).
function matchedRecordType(ref, isInflow) {
  const m = (ref || '').match(/^(Deposit|Journal|Check|Bill)\b/);
  if (m) return m[1] === 'Journal' ? 'Journal Entry' : m[1];
  return isInflow ? 'Deposit' : 'Check';
}

function slideoutView(tx) {
  // Derive a uniform view of the Rent Manager record this transaction is matched to,
  // whether it came from a suggested match, a multi-match selection, or a manual Add.
  const acct = ACCOUNTS.find(a=>a.id===S.activeId);
  const amount = tx.deposit!=null ? tx.deposit : (tx.payment!=null ? tx.payment : 0);
  const isInflow = tx.deposit != null;
  if (tx.matchRow) {
    const d = tx.matchRow.depositDetails || {};
    return { ref: tx.matchRow.ref, date: tx.matchRow.date, amount: tx.matchRow.amount,
      bankAccount: d.bankAccount || (acct?acct.gl:''), comment: d.comment || tx.matchRow.comment || tx.desc,
      payments: d.payments || [], type: matchedRecordType(tx.matchRow.ref, isInflow) };
  }
  if (tx.multiMatches) {
    const m = tx.multiMatches[S.multiSel[tx.id]??0] || tx.multiMatches[0];
    return { ref: m.ref, date: m.date, amount: m.amount,
      bankAccount: m.account || (acct?acct.gl:''), comment: m.comment || tx.desc, payments: [],
      type: matchedRecordType(m.ref, isInflow) };
  }
  if (tx.rmLink) {
    // Pre-matched via a plain rmLink string — parse it instead of using the
    // raw bank feed text, so the reference and RM comment display correctly.
    const mr = matchRowFromTx(tx);
    return { ref: mr.ref, date: mr.date, amount, bankAccount: acct?acct.gl:'', comment: mr.comment || tx.desc,
      payments: [], type: matchedRecordType(mr.ref, isInflow) };
  }
  // Manually added via Add Transaction with no descriptive reference recorded yet.
  return { ref: 'New Rent Manager record', date: tx.date, amount,
    bankAccount: acct?acct.gl:'', comment: tx.desc, payments: [], type: isInflow ? 'Deposit' : 'Check' };
}

function openSlideout(txId) {
  const tx = acctTxs().find(t=>t.id===txId);
  if (!tx) return;
  // Open for matched transactions, or to preview a suggested single/multi match.
  if (!S.matchedIds.has(txId) && !tx.matchRow && !tx.multiMatches && tx.matchStatus !== 'match') return;
  S.slideoutTx = txId;
  renderSlideout();
  _ubOpenOverlaySignal('match');
}

// Live-reorder drag: the dragged row physically moves into place under the
// cursor, then the new order is committed from the DOM on drop/end.
let _bcDragEl = null, _bcDragGroup = null;
function bcDragStart(key, group, el) {
  _bcDragEl = el; _bcDragGroup = group;
  if (typeof event !== 'undefined' && event && event.dataTransfer) { event.dataTransfer.effectAllowed = 'move'; }
  // Defer so the drag-image snapshot is taken before the ghost style applies.
  requestAnimationFrame(() => el && el.classList.add('bc-dragging'));
}
function bcDragOver(e, key, group, el) {
  if (_bcDragGroup !== group || !_bcDragEl) return;
  e.preventDefault();
  if (e.dataTransfer) e.dataTransfer.dropEffect = 'move';
  if (el === _bcDragEl) return;
  const rect = el.getBoundingClientRect();
  const below = e.clientY > rect.top + rect.height / 2;
  const ref = below ? el.nextElementSibling : el;
  if (ref !== _bcDragEl) el.parentNode.insertBefore(_bcDragEl, ref);
}
function bcDragLeave() {}
function _bcCommitOrder() {
  if (!_bcDragEl || !_bcDragGroup) return;
  const orderKey = _bcDragGroup === 'quickActions' ? 'quickActionsOrder' : 'tilesOrder';
  const keys = [..._bcDragEl.parentNode.querySelectorAll('.bc-set-row')].map(r => r.dataset.key);
  SETTINGS_STATE[orderKey] = keys;
}
function bcDragEnd() {
  if (_bcDragEl) {
    _bcCommitOrder();
    _bcDragEl.classList.remove('bc-dragging');
  }
  _bcDragEl = null; _bcDragGroup = null;
  renderSettings();
  renderBC();
}
function bcDrop(targetKey, group) {
  if (typeof event !== 'undefined' && event) event.preventDefault();
  _bcCommitOrder();
}

function openAddRule() {
  _addRuleOpen = true;
  _addRuleConditions = [{id: Date.now()}];
  renderAddRule();
  _ubOpenOverlaySignal('create-rule');
}
function closeAddRule() {
  _addRuleOpen = false;
  document.getElementById('add-rule-root').innerHTML = '';
  _ubCloseOverlaySignal();
}

function addRuleCondition() {
  _addRuleConditions.push({id: Date.now()});
  renderAddRule();
}
function removeRuleCondition(id) {
  _addRuleConditions = _addRuleConditions.filter(c => c.id !== id);
  renderAddRule();
}

function saveRule() {
  const name = document.getElementById('ar-rule-name')?.value?.trim();
  if (!name) { document.getElementById('ar-rule-name').style.borderColor='#e04040'; return; }
  RULES.push({
    id: 'r' + Date.now(), name,
    summary: `Applies to <em style="color:#13314c">incoming transactions</em> in <em style="color:#13314c">all bank accounts.</em>`,
    details: []
  });
  closeAddRule();
  renderSettings();
  showToast('Rule added');
}

let _ruleDragKey = null;
function ruleDragStart(id) { _ruleDragKey = id; }
function ruleDrop(targetId) {
  if (!_ruleDragKey || _ruleDragKey === targetId) return;
  const fi = RULES.findIndex(r => r.id === _ruleDragKey);
  const ti = RULES.findIndex(r => r.id === targetId);
  const [moved] = RULES.splice(fi, 1);
  RULES.splice(ti, 0, moved);
  _ruleDragKey = null;
  renderSettings();
}

function renderSettingsMatching() {
  const ruleCards = RULES.map(rule => {
    const detailRows = rule.details.map(d => `
      <div style="display:flex;align-items:baseline;gap:8px">
        <span style="font-size:14px;color:#666;width:190px;flex-shrink:0">${d.label}</span>
        <span style="font-size:14px;font-weight:600;color:#13314c">${d.value}</span>
      </div>`).join('');

    return `<div class="bc-set-row" style="flex-direction:column;align-items:stretch;padding:16px;gap:16px;border:1px solid #cedbe7;border-radius:4px;background:#fff;cursor:default"
      draggable="true" ondragstart="ruleDragStart('${rule.id}')" ondragover="event.preventDefault()" ondrop="ruleDrop('${rule.id}')">
      <div style="display:flex;align-items:center;gap:16px">
        <span style="flex-shrink:0;display:flex;align-items:center;cursor:grab">${DRAG_ICON}</span>
        <span style="font-size:16px;font-weight:600;color:#13314c">${rule.name}</span>
      </div>
      <p style="font-size:14px;color:#666;line-height:20px;margin:0">${rule.summary}</p>
      <div style="border-top:1px solid #eef2f7"></div>
      <div style="display:flex;flex-direction:column;gap:8px">${detailRows}</div>
    </div>`;
  }).join('');

  return `
    <p style="font-size:14px;color:#666;line-height:20px;margin-bottom:16px">Rules allow you to auto-fill new Rent Manager transactions to any incoming unmatched bank transactions. If multiple rules apply to the same transaction, they will be applied in the order prioritized here.</p>
    <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:16px">
      <div style="flex:1;max-width:248px">
        <label style="font-size:14px;color:#666;display:block;margin-bottom:4px">Search</label>
        <div style="display:flex;align-items:center;gap:8px;height:36px;background:#f5f8fa;border:1px solid #cedbe7;border-radius:4px;padding:0 8px">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="#999"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>

// Incoming transactions the user has matched/added become settled register
// entries (and matched rows on both reconcile sides). Derived live from
// S.matchedIds so matching anywhere flows through to the register + reconcile.
function matchedIncomingRows(acctId) {
  return acctTxs(acctId).filter(t => S.matchedIds.has(t.id)).map(t => {
    const isDep = t.deposit != null;
    const amt = isDep ? t.deposit : (t.payment || 0);
    const mr = (typeof matchRowFromTx === 'function' && (t.matchRow || t.rmLink)) ? matchRowFromTx(t) : null;
    return {
      date: t.date.replace(/\/\d{2}(\d{2})$/, '/$1'),   // 06/16/2026 -> 06/16/26
      ref: mr && mr.ref ? mr.ref : 'NEW',
      type: isDep ? 'Deposit' : 'Withdrawal',
      info: t.desc,
      gl: isDep ? '4100 Rental Income' : '5400 Operating Expense',
      deposit: isDep ? amt : null,
      payment: isDep ? null : amt,
      cleared: false, _fromTx: t.id
    };
  });
}

function genBRRows(acctId) {
  return [...matchedIncomingRows(acctId), ...(BR_TX[acctId] || [])].map(r => ({ ...r }));
}

const REC_STATE = {
  acctId: null, statementDate: '', statementBalance: null,
  checked: {}, filter: 'all', search: '', collapsed: {},
  // Start-overlay state
  startOpen: false, startAcctId: null, startDate: '', startBalance: null,

const REC_STMT_DATE = '06/30/2026';
const REC_LAST_REC_DATE = '05/31/2026';

// ── Data ──

// Does this account still have bank-feed items open in Transaction Review?
function recHasInReview(acctId) {
  return acctTxs(acctId).some(t => !S.matchedIds.has(t.id) && !S.excludedIds.has(t.id));
}

// Beginning balance = book balance as of the last reconciliation. Excluded
// feed activity is folded in so the demo still proves out to $0 regardless of
// how each review item was resolved (matched vs excluded).
function recBeginningBalance(acctId) {
  // Last statement's ending balance: the live bank balance minus everything
  // that cleared this period (matched feed transactions + RM records already
  // cleared against the bank). Excluded feed activity stays baked in, so the
  // demo proves out to $0 regardless of how each review item was resolved.
  const acct = ACCOUNTS.find(a => a.id === acctId);
  const matchedNet = acctTxs(acctId).reduce((s, t) => S.matchedIds.has(t.id)
    ? s + (t.deposit != null ? t.deposit : -(t.payment || 0)) : s, 0);
  const clearedNet = (BR_TX[acctId] || []).reduce((s, r) => r.cleared
    ? s + (r.deposit != null ? r.deposit : -(r.payment || 0)) : s, 0);
  return acct.bankBalance - matchedNet - clearedNet;
}

const _recDateVal = s => { let [m, d, y] = s.split('/').map(Number); if (y < 100) y += 2000; return new Date(y, m - 1, d).getTime(); };

// RM-side display info for a matched bank transaction: reference short code,
// human-readable record text, and GL account. Prefers the real matched record
// (matchRow / selected multi-match / rmLink); synthesizes sensible text for
// records the user created via Add Transaction.
function rmSideForTx(tx) {
  const inflow = tx.deposit != null;
  if (tx.multiMatches) {
    const m = tx.multiMatches[S.multiSel[tx.id] ?? 0] || tx.multiMatches[0];
    return { ref: regRefCode(m.ref), text: m.ref.replace(':', ' -'), gl: '4100 Rental Income', amount: m.amount };
  }
  const mr = matchRowFromTx(tx);
  if (mr && mr.ref) {
    return { ref: regRefCode(mr.ref), text: mr.comment ? `${mr.ref} - ${mr.comment}` : mr.ref,
      gl: inflow ? '4100 Rental Income' : '5400 Operating Expense', amount: mr.amount };
  }
  const desc = tx.desc || '';
  const amt = inflow ? tx.deposit : tx.payment;
  const tc = s => s.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
  const chk = desc.match(/CHECK\s+0*(\d+)\s*(.*)/i);
  if (chk) return { ref: chk[1], text: `Check #${chk[1]} - ${tc(chk[2])}`, gl: '5402 Repairs & Maintenance', amount: amt };
  if (!inflow) {
    const rest = desc.replace(/^(ACH|POS)\s+DEBIT\s*[\u2014-]?\s*/i, '');
    return { ref: 'EFT', text: `ACH - ${tc(rest)}`, gl: '5400 Operating Expense', amount: amt };
  }
  const num = 8800 + Math.abs(desc.split('').reduce((a, c) => a + c.charCodeAt(0), 0) % 60);
  return { ref: 'D' + num, text: `Deposit batch - ${tc(desc)}`, gl: '4100 Rental Income', amount: amt };
}

// Rows for the reconciliation tables:
// - Matched: bank transactions matched to Rent Manager records in Transaction
//   Review — bank side + RM side populated, pre-checked.
// - Review: records created in / living in Rent Manager with no bank
//   transaction to match (e.g. a check the vendor hasn't cashed) — bank side
//   shows "-", status Review, unchecked.
function recData(acctId) {
  const rows = [];
  acctTxs(acctId).filter(t => S.matchedIds.has(t.id)).forEach(t => {
    const inflow = t.deposit != null;
    const rm = rmSideForTx(t);
    rows.push({
      id: 'm' + t.id, inflow, date: t.date, bankDesc: t.desc,
      bankAmt: inflow ? t.deposit : t.payment,
      ref: rm.ref, rmText: rm.text, account: rm.gl,
      rmAmt: rm.amount != null ? rm.amount : (inflow ? t.deposit : t.payment),
      status: 'Matched',
    });
  });
  // Every record created in / living in Rent Manager appears too: ones that
  // already cleared the bank are matched pairs; ones with no bank transaction
  // yet (e.g. an uncashed check) show "-" on the bank side and need review.
  (BR_TX[acctId] || []).forEach((r, i) => {
    const amt = r.deposit != null ? r.deposit : (r.payment || 0);
    rows.push({
      id: 'o' + i, inflow: r.deposit != null, date: r.date.replace(/\/(\d{2})$/, '/20$1'),
      bankDesc: r.cleared ? r.info : null, bankAmt: r.cleared ? amt : null,
      ref: r.ref, rmText: r.info, account: r.gl, rmAmt: amt,
      status: r.cleared ? 'Matched' : 'Review', recType: r.type,
    });
  });
  // Orion insight: a plain-language guess at why each unmatched record has no
  // bank transaction yet — a likely duplicate, an uncashed check, or activity
  // the bank simply hasn't posted yet.
  rows.filter(r => r.status === 'Review').forEach(r => {
    const dup = rows.find(o => o !== r && o.inflow === r.inflow && Math.abs(o.rmAmt - r.rmAmt) < 0.005);
    if (dup) r.insight = `Possible duplicate \u2014 ${dup.ref} for this exact amount was already recorded on ${dup.date}.`;
    else if (r.recType === 'Check') r.insight = `Check likely hasn't been cashed yet \u2014 vendor checks typically clear within 5\u201310 days of being sent.`;
    else if (r.inflow) r.insight = `No matching bank deposit yet \u2014 batches recorded ${r.date} usually settle within 1\u20132 business days. Likely still pending.`;
    else r.insight = `Transfer initiated ${r.date} \u2014 likely still pending with the bank. Larger transfers can take 2\u20133 business days to post.`;
  });
  rows.sort((a, b) => _recDateVal(a.date) - _recDateVal(b.date));
  return { deposits: rows.filter(r => r.inflow), payments: rows.filter(r => !r.inflow) };
}

function seedReconcile(acctId, dateOverride, balanceOverride) {
  const acct = ACCOUNTS.find(a => a.id === acctId);
  if (!acct) return;
  REC_STATE.acctId = acctId;
  REC_STATE.statementDate = dateOverride || REC_STMT_DATE;
  REC_STATE.statementBalance = balanceOverride != null ? balanceOverride : acct.bankBalance;
  REC_STATE.filter = 'all';
  REC_STATE.search = '';
  REC_STATE.collapsed = {};
  const d = recData(acctId);
  REC_STATE.checked = {};
  [...d.deposits, ...d.payments].forEach(r => { REC_STATE.checked[r.id] = r.status === 'Matched'; });
}

// ── Start Smart Reconciliation overlay ──

function openReconcile(acctId) {
  REC_STATE.startOpen = true;
  REC_STATE.startAcctId = acctId || null;
  const acct = acctId ? ACCOUNTS.find(a => a.id === acctId) : null;
  if (acct && !recHasInReview(acct.id)) {
    REC_STATE.startDate = REC_STMT_DATE;
    REC_STATE.startBalance = acct.bankBalance;
  } else {
    REC_STATE.startDate = ''; REC_STATE.startBalance = null;
  }
  renderRecStart();
  _ubOpenOverlaySignal('smart-reconcile');
}
function closeRecStart() {
  REC_STATE.startOpen = false;
  document.getElementById('rec-start-root').innerHTML = '';
  _ubCloseOverlaySignal();
}
// Picking an account "uploads" its statement automatically and extracts the
// statement end date + ending balance from it.
function recStartPick(acctId) {
  REC_STATE.startAcctId = acctId || null;
  const acct = ACCOUNTS.find(a => a.id === acctId);
  const clean = !!acct && !recHasInReview(acct.id);
  REC_STATE.startDate = clean ? REC_STMT_DATE : '';
  REC_STATE.startBalance = clean ? acct.bankBalance : null;
  renderRecStart();
}
function recStartField(field, val) {
  if (field === 'date') REC_STATE.startDate = val;
  else { const n = parseFloat(String(val).replace(/[^0-9.-]/g, '')); REC_STATE.startBalance = isNaN(n) ? null : n; }
}
function recStartContinue() {
  const acctId = REC_STATE.startAcctId;
  if (!acctId || recHasInReview(acctId)) return;
  seedReconcile(acctId, REC_STATE.startDate, REC_STATE.startBalance);
  closeRecStart();
  showScreen('rec');
}

// Current out-of-balance amount, same math the strip's Difference box shows.
function srDifference() {
  const acct = ACCOUNTS.find(a => a.id === REC_STATE.acctId);
  if (!acct) return 0;
  const d = recData(acct.id);
  const amtOf = r => r.bankAmt != null ? r.bankAmt : r.rmAmt;
  const selNet = [...d.deposits, ...d.payments].reduce((s, r) => REC_STATE.checked[r.id]
    ? s + (r.inflow ? 1 : -1) * amtOf(r) : s, 0);
  const stmtBal = REC_STATE.statementBalance != null ? REC_STATE.statementBalance : acct.bankBalance;
  return +(stmtBal - (recBeginningBalance(acct.id) + selNet)).toFixed(2);
}

// Save & Finish: balanced accounts finish straight away; out-of-balance ones
// get a confirmation overlay so finishing with a difference is deliberate.
function srTryFinish() {
  const diff = srDifference();
  if (Math.abs(diff) < 0.005) { finishReconciliation(); return; }
  document.getElementById('rec-start-root').innerHTML = `
    <div class="at-overlay" onclick="if(event.target===this)srCloseWarn()">
      <div class="sr-modal" style="width:480px">
        <div class="at-hdr">
          <span class="at-hdr-title" style="font-size:17px;font-weight:600">Finish with a difference?</span>
          <button class="at-hdr-ico" onclick="srCloseWarn()" title="Close">${AT_X_ICO}</button>
        </div>
        <div class="sr-body" style="gap:10px">
          <div style="display:flex;gap:10px;align-items:flex-start">
            ${SR_ALERT_ICO}
            <div style="font-size:14px;color:#13314c;line-height:1.5">This account is out of balance by <b>${fmt(Math.abs(diff))}</b>. Finishing now will record the reconciliation with an unresolved difference.</div>
          </div>
          <div style="font-size:13px;color:#666;line-height:1.5">You can go back to clear the remaining transactions, or confirm the statement ending balance, before finishing.</div>
        </div>
        <div class="sr-foot">
          <button class="btn-primary" style="height:34px;padding:0 16px" onclick="srConfirmFinish()">Finish Anyway</button>
          <button class="at-cancel" style="height:34px" onclick="srCloseWarn()">Go Back</button>
        </div>
      </div>
    </div>`;
}
function srCloseWarn() { document.getElementById('rec-start-root').innerHTML = ''; }
function srConfirmFinish() { srCloseWarn(); finishReconciliation(); }

function finishReconciliation() {
  const acct = ACCOUNTS.find(a => a.id === REC_STATE.acctId);
  if (!acct) return;
  const d = recData(acct.id);
  const all = [...d.deposits, ...d.payments];
  const matchedCount = all.filter(r => r.status === 'Matched').length;
  const selNet = all.reduce((s, r) => REC_STATE.checked[r.id]
    ? s + (r.inflow ? 1 : -1) * (r.bankAmt != null ? r.bankAmt : r.rmAmt) : s, 0);
  const cleared = recBeginningBalance(acct.id) + selNet;
  document.getElementById('rec-inner').innerHTML = `
    <div class="rec-done-wrap">
      <div class="rec-done-panel">
        ${ic(P.check, 48, '#6eb744')}
        <div class="rec-done-title">Reconciliation complete.</div>

          <div class="rec-done-row"><span>Closing balance</span><span>${fmt(REC_STATE.statementBalance)}</span></div>
          <div class="rec-done-row"><span>Book balance in RM</span><span>${fmt(cleared)}</span></div>
          <div class="rec-done-row"><span>Period end date</span><span>${REC_STATE.statementDate || '\u2014'}</span></div>
          <div class="rec-done-row"><span>Transactions matched</span><span>${matchedCount}</span></div>
          ${Math.abs(srDifference()) >= 0.005 ? `<div class="rec-done-row"><span>Unresolved difference</span><span style="color:#eb343c">${fmt(Math.abs(srDifference()))}</span></div>` : ''}
        </div>

        </div>
        <button class="link-btn" style="font-size:13px;cursor:pointer" onclick="showScreen('bc')">Back to Banking Center</button>
      </div>
    </div>`;
}

function srSection(title, key, rows, acctId) {
  const q = REC_STATE.search.trim().toLowerCase();
  let shown = rows;
  if (REC_STATE.filter === 'uncleared') shown = shown.filter(r => !REC_STATE.checked[r.id]);
  if (q) shown = shown.filter(r => (r.bankDesc || '').toLowerCase().includes(q) || r.rmText.toLowerCase().includes(q) || (r.ref || '').toLowerCase().includes(q));
  const stmtTotal = rows.reduce((s, r) => s + (r.bankAmt || 0), 0);
  const rmTotal = rows.reduce((s, r) => s + r.rmAmt, 0);
  // Outstanding = what hasn't cleared: RM activity minus the selected rows —
  // tracks the Difference box as rows are checked and unchecked.
  const selTotal = rows.reduce((s, r) => REC_STATE.checked[r.id] ? s + (r.bankAmt != null ? r.bankAmt : r.rmAmt) : s, 0);
  const outstanding = +(rmTotal - selTotal).toFixed(2);

      <td class="sr-insight-cell">${r.insight ? `<div class="sr-insight" data-tip="${r.insight.replace(/"/g, '&quot;')}">${orionSpark(14)}<span>${r.insight}</span></div>` : ''}</td>

  return `
    <div class="sr-sec-hdr">
      <button class="chev" onclick="srToggleSection('${key}')">${ic(collapsed ? P.right : P.down, 18, '#13314c')}</button>
      <span class="sr-sec-title">${title}</span>

        <span>Statement<b>${fmt(stmtTotal)}</b></span>
        <span>Rent Manager<b>${fmt(rmTotal)}</b></span>
        <span>Outstanding<b class="${outstanding > 0 ? 'neg' : ''}">${outstanding > 0 ? '+' : ''}${fmt(outstanding)}</b></span>
      </div>

    ${collapsed ? '' : `<table class="sr-tbl">
      <colgroup>
        <col style="width:36px"><col style="width:92px"><col><col style="width:92px">

        <th>Reference</th><th>Rent Manager Transaction</th><th>Account</th><th class="r">Amount</th><th>Status</th>

      <tbody>${body || `<tr><td colspan="10" style="text-align:center;color:#9aa7b3;padding:20px 0">No transactions</td></tr>`}</tbody>
    </table>`}`;
}

function renderReconcile() {
  const acct = ACCOUNTS.find(a => a.id === REC_STATE.acctId);
  if (!acct) return;
  const d = recData(acct.id);
  const all = [...d.deposits, ...d.payments];
  const beginning = recBeginningBalance(acct.id);
  const selDeps = d.deposits.filter(r => REC_STATE.checked[r.id]);
  const selPays = d.payments.filter(r => REC_STATE.checked[r.id]);
  const amtOf = r => r.bankAmt != null ? r.bankAmt : r.rmAmt;
  const selDepTotal = selDeps.reduce((s, r) => s + amtOf(r), 0);
  const selPayTotal = selPays.reduce((s, r) => s + amtOf(r), 0);
  const cleared = beginning + selDepTotal - selPayTotal;
  const stmtBal = REC_STATE.statementBalance != null ? REC_STATE.statementBalance : acct.bankBalance;
  const diff = +(stmtBal - cleared).toFixed(2);
  const balanced = Math.abs(diff) < 0.005;

  document.getElementById('rec-inner').innerHTML = `
    <div class="sr-strip">
      <div class="sr-acct">
        ${ic(P.bank, 18, '#13314c')}
        <span>${acct.gl}</span>

        <div class="sr-cell"><span class="sr-cell-lbl">Beginning Balance</span><span class="sr-cell-val">${fmt(beginning)}</span></div>

        <span class="sr-op">\u2212</span>
        <div class="sr-cell"><span class="sr-cell-lbl">Selected Payments (${selPays.length})</span><span class="sr-cell-val neg">${fmt(selPayTotal)}</span></div>
        <span class="sr-op">=</span>
        <div class="sr-cell"><span class="sr-cell-lbl">Cleared Balance</span><span class="sr-cell-val">${fmt(cleared)}</span></div>
        <span class="sr-vdiv"></span>
        <div class="sr-cell"><span class="sr-cell-lbl">Statement Ending</span><span class="sr-cell-val">${fmt(stmtBal)}</span></div>
        <div class="sr-cell"><span class="sr-cell-lbl">Statement End Date</span><span class="sr-cell-val">${REC_STATE.statementDate || REC_STMT_DATE}</span></div>
        <div class="sr-diff${balanced ? ' ok' : ''}">
          ${balanced ? ic(P.check, 17, '#2e7d32') : SR_ALERT_ICO}
          <span class="lbl">Difference</span><span class="val">${fmt(Math.abs(diff))}</span>
        </div>

    </div>

      <div class="sr-search">
        <span class="ico-wrap">${ic(P.search, 15, '#9aa7b3')}</span>
        <input id="sr-search-input" placeholder="Find a transaction" value="${REC_STATE.search.replace(/"/g, '&quot;')}" oninput="srSetSearch(this.value)">
      </div>
      <div class="sr-seg">
        <button class="sr-seg-btn${REC_STATE.filter === 'uncleared' ? ' on' : ''}" onclick="REC_STATE.filter='uncleared';renderReconcile()">Uncleared</button>
        <button class="sr-seg-btn${REC_STATE.filter === 'all' ? ' on' : ''}" onclick="REC_STATE.filter='all';renderReconcile()">All</button>

      ${balanced ? '' : `<span class="rec-foot-notice">${SR_ALERT_ICO} Account is not in balance</span>`}
